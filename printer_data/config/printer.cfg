[heater_bed]
heater_pin: PF5
sensor_type: Generic 3950
sensor_pin: PB1 # TB
control: watermark
min_temp: -100
max_temp: 130

# [fan]
# pin: PF7

#[heater_fan SoC_fan]
#pin: CB1:gpio79
#pin: RPI:gpio26

[mcu]
#serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_44001F000C51313339373836-if00
canbus_uuid: 2b680827ca31
[printer]
kinematics: corexy
max_velocity: 400
max_accel: 5000
max_z_velocity: 400
max_z_accel: 5000

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PC13
diag_pin: PF4
driver_SGTHRS: 80
run_current: 0.800
stealthchop_threshold: 0
sense_resistor: 0.110

[tmc2209 stepper_y]
uart_pin: PE3
diag_pin: PF3
driver_SGTHRS: 120
run_current: 0.800
stealthchop_threshold: 0
sense_resistor: 0.110

[tmc2209 stepper_z]
uart_pin: PB9
#diag_pin: PF0
run_current: 0.650
stealthchop_threshold: 999999
sense_resistor: 0.110

[tmc2209 stepper_z1]
uart_pin: PB5
#diag_pin: PC15
run_current: 0.650
stealthchop_threshold: 999999
sense_resistor: 0.110

[tmc2209 stepper_z2]
uart_pin: PG14
run_current: 0.65
stealthchop_threshold: 999999
sense_resistor: 0.110

[tmc2209 stepper_z3]
uart_pin: PG10
run_current: 0.65
stealthchop_threshold: 999999
sense_resistor: 0.110

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

