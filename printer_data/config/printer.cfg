# This file contains common pin mappings for the BIGTREETECH Manta M8P
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" "8 MHz crystal"
# and "USB (on PA11/PA12)" or "CAN bus (on PD12/PD13)".

# See docs/Config_Reference.md for a description of parameters.
[include fluidd.cfg]
[include toolchanger/readonly-configs/toolchanger-include.cfg]
[include shaketune.cfg]
[include sb_leds.cfg]
[force_move]
enable_force_move: true

[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 32
full_steps_per_rotation: 200
#endstop_pin: ^PF4
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 180
position_max: 180
homing_speed: 80
homing_positive_dir: true
homing_retract_dist: 0

[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 32
full_steps_per_rotation: 200
#endstop_pin: ^PF3
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 180
position_max: 180
homing_speed: 80
homing_positive_dir: true
homing_retract_dist: 0

[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 32
gear_ratio:64:16
rotation_distance:32
endstop_pin: ^!EBBT0:PB6
position_endstop: 0
position_max: 165
position_min: -5

[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
microsteps: 32
gear_ratio:64:16
rotation_distance: 32

[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
microsteps: 32
gear_ratio:64:16
rotation_distance: 32

[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
microsteps: 32
gear_ratio:64:16
rotation_distance: 32

